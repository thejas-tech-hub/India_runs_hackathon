methodology_summary: |
  Five-stage pipeline processing 100K candidates against a Job Description:
  
  1. IntegrityFilter — Detects and removes honeypot/synthetic candidates
     using skill-duration anomalies, career consistency, and field validation.
     Removed ~9.2% of candidates as honeypots.
  
  2. HireabilityEvaluator — Computes three behavioral scores (Availability,
     Evidence Coverage, Risk) for each clean candidate.
  
  3. HybridRetriever — BM25 lexical search + dense embeddings (all-MiniLM-L6-v2)
     fused via Reciprocal Rank Fusion (k=60) to retrieve Top 500 candidates.
  
  4. FinalRanker — Cross-encoder (ms-marco-MiniLM-L-6-v2) re-ranking fused
     with behavioral scores using weighted composite formula:
     Final = 0.4*Semantic + 0.25*Availability + 0.2*Evidence - 0.15*Risk
  
  5. ReasoningEngine — Phi-3-mini (Q4 quantized, CPU-only) generates structured
     JSON justifications for Top 10 candidates using GBNF grammar enforcement.
  
  All processing is CPU-only, fully offline, and completes in ~254 seconds.
